/* ---------- style helpers ---------- */
// Convert a CSS text string ("a:b;c:d") into a React style object (camelCased).
function css(str){
  if(!str) return {};
  if(typeof str === 'object') return str;
  const out = {};
  str.split(';').forEach(part=>{
    const i = part.indexOf(':');
    if(i < 0) return;
    const k = part.slice(0,i).trim();
    if(!k) return;
    const v = part.slice(i+1).trim();
    out[k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase())] = v;
  });
  return out;
}

// Box: renders any tag and supports the prototype's style-hover / style-focus.
// s = base style (string or object), h = hover css string, f = focus css string.
function Box({ tag='div', s, h, f, children, onMouseEnter, onMouseLeave, onFocus, onBlur, ...rest }){
  const [hov,setHov] = useState(false);
  const [foc,setFoc] = useState(false);
  let style = { ...css(s) };
  if(hov && h) style = { ...style, ...css(h) };
  if(foc && f) style = { ...style, ...css(f) };
  return React.createElement(tag, {
    ...rest,
    style,
    onMouseEnter:(e)=>{ if(h) setHov(true); onMouseEnter && onMouseEnter(e); },
    onMouseLeave:(e)=>{ if(h) setHov(false); onMouseLeave && onMouseLeave(e); },
    onFocus:(e)=>{ if(f) setFoc(true); onFocus && onFocus(e); },
    onBlur:(e)=>{ if(f) setFoc(false); onBlur && onBlur(e); },
  }, children);
}

function todayISO(){ const d=new Date(); const p=(n)=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
// แปลง yyyy-mm-dd → "14 มิ.ย. 69" (พ.ศ. 2 หลัก)
function thaiFromISO(iso){ if(!iso) return ''; const p=iso.split('-'); if(p.length<3) return ''; const y=+p[0],mo=+p[1],da=+p[2]; return da+' '+THAI_MONTHS[mo-1]+' '+((y+543)%100); }

// SearchSelect: dropdown ที่พิมพ์ค้นหาได้ (combobox)
function SearchSelect({ value, options, onChange, placeholder, size }){

  const sel = options.find(o=>o.value===value);

  const filtered = ql ? options.filter(o=>o.label.toLowerCase().includes(ql)) : options;
  const h = size==='sm' ? 44 : 46;
  React.useEffect(()=>{
    const onDoc=(e)=>{ if(ref.current && !ref.current.contains(e.target)){ setOpen(false); setQ(''); } };
    document.addEventListener('mousedown',onDoc);
    return ()=>document.removeEventListener('mousedown',onDoc);
  },[]);
  const fieldBase = 'width:100%;height:'+h+'px;border:1px solid '+(open?'#B97FCE':'#E7E2EF')+';border-radius:12px;background:'+(open?'#fff':'#F7F5FA')+';padding:0 38px 0 14px;font-size:14px;color:'+(sel?'#211A2E':'#A79FB6')+';cursor:pointer;display:flex;align-items:center;transition:all .16s;'+(open?'box-shadow:0 0 0 4px rgba(139,47,168,.10);':'');
  return (
    <div ref={ref} style={css('position:relative')}>
      <div onClick={()=>{ setOpen(o=>!o); setQ(''); }} style={css(fieldBase)}>
        <span style={css('flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap')}>{sel ? sel.label : (placeholder||'— เลือก —')}</span>
      </div>
      <span style={css('position:absolute;right:14px;top:'+(h/2)+'px;transform:translateY(-50%);color:#A79FB6;pointer-events:none;transition:transform .18s;'+(open?'transform:translateY(-50%) rotate(180deg);':''))}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </span>
      {open && (
        <div style={css('position:absolute;left:0;right:0;top:'+(h+6)+'px;background:#fff;border:1px solid #EAE6F0;border-radius:13px;box-shadow:0 18px 50px rgba(33,26,46,.2);z-index:60;overflow:hidden;animation:popIn .14s ease')}>
          <div style={css('padding:9px;border-bottom:1px solid #F0EDF5')}>
            <Box tag="input" autoFocus value={q} onChange={(e)=>setQ(e.target.value)} placeholder="พิมพ์เพื่อค้นหา..."
              s="width:100%;height:38px;border:1px solid #E7E2EF;border-radius:10px;background:#F7F5FA;padding:0 12px;font-size:13.5px" f={FIELD_FOCUS} />
          </div>
          <div style={css('max-height:240px;overflow-y:auto;padding:5px')}>
            {filtered.length===0 && <div style={css('padding:14px;text-align:center;font-size:13px;color:#A79FB6')}>ไม่พบรายการ</div>}

const db = {
  async loadAll(){
    const [items, workers, vehicles, teams, movements, meta] = await Promise.all([
      sb.from('items').select('*').order('code'),
      sb.from('workers').select('*').order('created_at'),
      sb.from('vehicles').select('*').order('created_at'),
      sb.from('teams').select('*').order('created_at'),
      sb.from('movements').select('*').order('created_at',{ascending:false}),
      sb.from('app_meta').select('*').eq('k','refSeq').single(),
    ]);
    for(const r of [items,workers,vehicles,teams,movements]){ if(r.error) throw r.error; }
    return {
      items:     (items.data||[]).map(r=>({ id:r.id, code:r.code, name:r.name, cat:r.cat, unit:r.unit, qty:r.qty, min:r.min_qty, loc:r.loc })),
      workers:   workers.data||[],
      vehicles:  vehicles.data||[],
      teams:     (teams.data||[]).map(r=>({ id:r.id, name:r.name, leadId:r.lead_id, memberIds:r.member_ids||[], plates:r.plates||[], ord:(r.ord==null?null:r.ord) })).sort((a,b)=>(a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord)),
      movements: (movements.data||[]).map(r=>({ id:r.id, type:r.type, kind:r.kind, item:r.item, qty:r.qty, unit:r.unit, party:r.party, sub:r.sub, ref:r.ref, date:r.date_text })),
      refSeq:    meta.data ? meta.data.v : 24,
    };
  },
  async upsertItem(it){
    const row = { id:it.id, code:it.code, name:it.name, cat:it.cat, unit:it.unit, qty:it.qty, min_qty:it.min, loc:it.loc };
    const { error } = await sb.from('items').upsert(row); if(error) throw error;
  },
  async updateItemQty(id, qty){
    const { error } = await sb.from('items').update({ qty }).eq('id', id); if(error) throw error;
  },
  async insertWorker(w){ const { error } = await sb.from('workers').insert(w); if(error) throw error; },
  async insertVehicle(v){ const { error } = await sb.from('vehicles').insert(v); if(error) throw error; },
  async insertMovements(rows){
    const mapped = rows.map(m=>({ id:m.id, type:m.type, kind:m.kind||null, item:m.item, qty:m.qty, unit:m.unit, party:m.party, sub:m.sub, ref:m.ref, date_text:m.date }));
    const { error } = await sb.from('movements').insert(mapped); if(error) throw error;
  },
  async setRefSeq(v){ const { error } = await sb.from('app_meta').upsert({ k:'refSeq', v }); if(error) throw error; },
  async deleteWorker(id){ const { error } = await sb.from('workers').delete().eq('id', id); if(error) throw error; },
  async updateWorker(id, data){ const { error } = await sb.from('workers').update(data).eq('id', id); if(error) throw error; },
  async deleteItem(id){ const { error } = await sb.from('items').delete().eq('id', id); if(error) throw error; },
  async updateItem(id, data){ const { error } = await sb.from('items').update(data).eq('id', id); if(error) throw error; },
  async insertTeam(t){ const { error } = await sb.from('teams').insert({ id:t.id, name:t.name, lead_id:t.leadId||null, member_ids:t.memberIds, plates:t.plates }); if(error) throw error; },
  async updateTeam(id, data){ const { error } = await sb.from('teams').update(data).eq('id', id); if(error) throw error; },
  async deleteTeam(id){ const { error } = await sb.from('teams').delete().eq('id', id); if(error) throw error; },
  async updateMovement(id, data){ const { error } = await sb.from('movements').update(data).eq('id', id); if(error) throw error; },
  async deleteMovement(id){ const { error } = await sb.from('movements').delete().eq('id', id); if(error) throw error; },
};

/* ---------- Auth gate ---------- */
function Root(){
  const [checking,setChecking] = useState(true);
  const [isAdmin,setIsAdmin] = useState(false);
  const [showLogin,setShowLogin] = useState(false);
  React.useEffect(()=>{
    if(!sb){ setIsAdmin(true); setChecking(false); return; } // โหมด DEMO = แก้ไขได้เต็มที่
    sb.auth.getSession().then(({data})=>{
      setIsAdmin(!!data.session); setChecking(false);
    });
    const { data:sub } = sb.auth.onAuthStateChange((_evt, session)=>{
      setIsAdmin(!!session);
      if(session) setShowLogin(false);
    });
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(checking) return <LoadingScreen msg="กำลังโหลด..." />;
  return (
    <React.Fragment>
      <App isAdmin={isAdmin}
           onSignOut={()=>sb && sb.auth.signOut()}
           onLoginClick={()=>setShowLogin(true)} />
      {showLogin && <LoginModal onClose={()=>setShowLogin(false)} onSignedIn={()=>setShowLogin(false)} />}
    </React.Fragment>
  );
}

  componentDidMount(){
    if(SB_READY){ this.setState({ loading:true }); this.reloadFromDb(); }
    else { this.animateKpis(); }
  }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); clearTimeout(this._tt); }
  async reloadFromDb(){
    try {
      const all = await db.loadAll();
      this.setState({
        items:all.items, workers:all.workers, vehicles:all.vehicles,
        teams:all.teams, movements:all.movements, refSeq:all.refSeq, loading:false
      }, ()=>this.animateKpis());
    } catch(e){
      this.setState({ loading:false });
      this.toast('โหลดข้อมูลไม่สำเร็จ', e.message||'ตรวจสอบการเชื่อมต่อ', 'danger');
    }
  }

  // ---------- helpers ----------
  fmt(n){ return (n||0).toLocaleString('en-US'); }
  cat(){ return { 'ศีรษะ':'#8B2FA8','ตา/ใบหน้า':'#3B74D6','มือ':'#1E9E6A','เท้า':'#D98A1F','ลำตัว':'#C0398A','กันตก':'#D5443F','อื่นๆ':'#6E687C' }; }
  catColor(c){ return this.cat()[c] || '#6E687C'; }
  status(it){
    if(it.qty<=0) return { label:'หมด', color:'#D5443F', bg:'#FBEAEA' };
    if(it.qty<=it.min) return { label:'ใกล้หมด', color:'#D98A1F', bg:'#FBF1E2' };
    return { label:'ปกติ', color:'#1E9E6A', bg:'#E7F6EF' };
  }
  pct(it){ const cap=Math.max(it.min*3, it.qty, 1); return Math.max(4, Math.min(100, it.qty/cap*100)); }
  thaiToday(){ const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; const d=new Date(); return d.getDate()+' '+m[d.getMonth()]+' '+((d.getFullYear()+543)%100); }
  lowItems(){ return this.state.items.filter(i=>i.qty<=i.min); }
  issueSummary(name){
    const moves=this.state.movements.filter(m=>m.type==='out' && m.party===name);
    const map={};
    moves.forEach(m=>{ if(!map[m.item]) map[m.item]={item:m.item, qty:0, times:0, unit:m.unit, last:m.date}; map[m.item].qty+=m.qty; map[m.item].times++; });
    return { moves, count:moves.length, total:moves.reduce((a,b)=>a+b.qty,0), latest:moves[0]?moves[0].date:'—', agg:Object.values(map) };
  }
  openDetail(type,id){ this.setState({ detail:{type,id} }); }
  closeDetail(){ this.setState({ detail:null }); }
  setInvSort(key){ this.setState(s=>{ const c=s.invSort; const dir = c.key===key ? (c.dir==='asc'?'desc':'asc') : 'asc'; return { invSort:{ key, dir } }; }); }

  // ---------- edit / delete ----------
  openEditWorker(w){ if(!this.requireAdmin()) return; this.setState({ editData:{ type:'worker', id:w.id, name:w.name, pos:w.pos||'', dept:w.dept||'' } }); }
  openEditItem(it){ if(!this.requireAdmin()) return; this.setState({ editData:{ type:'item', id:it.id, code:it.code||'', name:it.name||'', cat:it.cat||'ศีรษะ', unit:it.unit||'', qty:it.qty, min:it.min, loc:it.loc||'' } }); }
  setEditField(f,v){ this.setState(s=>({ editData:{ ...s.editData, [f]:v } })); }
  async submitEditWorker(){
    const d=this.state.editData; if(!d) return;
    const name=(d.name||'').trim(), pos=(d.pos||'').trim(), dept=(d.dept||'').trim();
    if(!name){ this.toast('กรุณากรอกชื่อ','','warn'); return; }
    this.setState(s=>({ workers:s.workers.map(w=>w.id===d.id?{...w,name,pos,dept}:w), editData:null }));
    if(SB_READY) try{ await db.updateWorker(d.id,{name,pos,dept}); this.toast('แก้ไขสำเร็จ',name,'success'); }
    catch(e){ this.toast('แก้ไขไม่สำเร็จ',e.message,'danger'); }
    else this.toast('แก้ไขสำเร็จ',name,'success');
  }
  async submitEditItem(){
    const d=this.state.editData; if(!d) return;
    const name=(d.name||'').trim(), code=(d.code||'').trim(), unit=(d.unit||'').trim();
    if(!name||!code){ this.toast('กรุณากรอกข้อมูลให้ครบ','','warn'); return; }
    const qty=Number(d.qty)||0, min=Number(d.min)||0;
    this.setState(s=>({ items:s.items.map(i=>i.id===d.id?{...i,code,name,cat:d.cat,unit,qty,min,loc:d.loc||''}:i), editData:null }));
    if(SB_READY) try{ await db.updateItem(d.id,{code,name,cat:d.cat,unit,qty,min_qty:min,loc:d.loc||''}); this.toast('แก้ไขสำเร็จ',name,'success'); }
    catch(e){ this.toast('แก้ไขไม่สำเร็จ',e.message,'danger'); }
    else this.toast('แก้ไขสำเร็จ',name,'success');
  }
  openEditMovement(m){ if(!this.requireAdmin()) return; this.setState({ editData:{ type:'movement', id:m.id, mvType:m.type, item:m.item, qty:String(m.qty), party:m.party||'', sub:m.sub||'', ref:m.ref||'', dateText:m.date||'', isoDate:todayISO() } }); }
  async submitEditMovement(){
    const d=this.state.editData; if(!d) return;
    const item=(d.item||'').trim(), party=(d.party||'').trim();
    if(!item){ this.toast('กรุณากรอกรายการอุปกรณ์','','warn'); return; }
    const qty=Number(d.qty)||1;
    const dateText=d.isoDate ? thaiFromISO(d.isoDate) : d.dateText;
    this.setState(s=>({ movements:s.movements.map(m=>m.id===d.id?{...m,item,qty,party,sub:d.sub||'',date:dateText}:m), editData:null }));
    if(SB_READY) try{ await db.updateMovement(d.id,{item,qty,party,sub:d.sub||'',date_text:dateText}); this.toast('แก้ไขสำเร็จ',item,'success'); }
    catch(e){ this.toast('แก้ไขไม่สำเร็จ',e.message,'danger'); }
    else this.toast('แก้ไขสำเร็จ',item,'success');
  }
  openDeleteConfirm(type,id,name){ if(!this.requireAdmin()) return; this.setState({ deleteConfirm:{type,id,name} }); }
  async executeDelete(){
    const dc=this.state.deleteConfirm; if(!dc) return;
    this.setState({ deleteConfirm:null });
    if(dc.type==='worker'){
      this.setState(s=>({ workers:s.workers.filter(w=>w.id!==dc.id) }));
      if(SB_READY) try{ await db.deleteWorker(dc.id); this.toast('ลบแล้ว',dc.name,'success'); }
      catch(e){ this.toast('ลบไม่สำเร็จ',e.message,'danger'); }
      else this.toast('ลบแล้ว',dc.name,'success');
    } else if(dc.type==='item'){
      this.setState(s=>({ items:s.items.filter(i=>i.id!==dc.id) }));
      if(SB_READY) try{ await db.deleteItem(dc.id); this.toast('ลบแล้ว',dc.name,'success'); }
      catch(e){ this.toast('ลบไม่สำเร็จ',e.message,'danger'); }
      else this.toast('ลบแล้ว',dc.name,'success');
    } else if(dc.type==='team'){
      this.setState(s=>({ teams:s.teams.filter(t=>t.id!==dc.id) }));
      if(SB_READY) try{ await db.deleteTeam(dc.id); this.toast('ลบแล้ว',dc.name,'success'); }
      catch(e){ this.toast('ลบไม่สำเร็จ',e.message,'danger'); }
      else this.toast('ลบแล้ว',dc.name,'success');
    } else if(dc.type==='movement'){
      this.setState(s=>({ movements:s.movements.filter(m=>m.id!==dc.id) }));
      if(SB_READY) try{ await db.deleteMovement(dc.id); this.toast('ลบแล้ว',dc.name,'success'); }
      catch(e){ this.toast('ลบไม่สำเร็จ',e.message,'danger'); }
      else this.toast('ลบแล้ว',dc.name,'success');
    }

  nav(v){ this.setState({ view:v, notifOpen:false }); if(v==='dashboard') this.animateKpis(); const el=document.querySelector('[data-scroll]'); if(el) el.scrollTop=0; }
  animateKpis(){
    cancelAnimationFrame(this._raf);
    const targets=this.kpiTargets(), start=performance.now(), dur=850;
    const step=(t)=>{ const p=Math.min(1,(t-start)/dur), e=1-Math.pow(1-p,3);
      this.setState({ kpiAnim: targets.map(v=>Math.round(v*e)) });
      if(p<1) this._raf=requestAnimationFrame(step);
    };
    this._raf=requestAnimationFrame(step);
  }
  kpiTargets(){
    const its=this.state.items;
    const sumQty=its.reduce((a,b)=>a+b.qty,0);
    const out=this.state.movements.filter(m=>m.type==='out').length;
    const low=this.lowItems().length;
    return [its.length, sumQty, out, low];
  }

    const qty=parseInt(is.lineQty)||0;
    if(qty<1){ this.toast('จำนวนไม่ถูกต้อง','ระบุจำนวนอย่างน้อย 1','warn'); return; }
    const lines=is.lines.slice();
    const ex=lines.find(l=>l.itemId===is.lineItem);
    if(ex) ex.qty+=qty; else lines.push({ itemId:is.lineItem, qty });
    this.setIssue({ lines, lineItem:'', lineQty:1 });
  }
  removeLine(i){ const lines=this.state.issue.lines.slice(); lines.splice(i,1); this.setIssue({ lines }); }
  initSig(c){
    const ctx=c.getContext('2d'); const r=c.getBoundingClientRect();
    c.width=r.width||300; c.height=r.height||120;
    ctx.lineWidth=2.4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#2A2138';
    let drawing=false, last=null;
    const pos=(e)=>{ const b=c.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return { x:t.clientX-b.left, y:t.clientY-b.top }; };
    const down=(e)=>{ drawing=true; last=pos(e); e.preventDefault(); };
    const move=(e)=>{ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; if(!this.state.sigInk) this.setState({sigInk:true}); e.preventDefault(); };
    const up=()=>{ drawing=false; };
    c.addEventListener('mousedown',down); c.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    c.addEventListener('touchstart',down,{passive:false}); c.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',up);
    this._sigCtx=ctx; this._sigCanvas=c;
  }
  clearSig(){ if(this._sigCtx&&this._sigCanvas) this._sigCtx.clearRect(0,0,this._sigCanvas.width,this._sigCanvas.height); this.setState({sigInk:false}); }
  async submitIssue(){
    if(!this.requireAdmin()) return;
    const is=this.state.issue;
    if(!is.recipientId){ this.toast('ยังไม่ได้เลือกผู้รับ', is.kind==='individual'?'กรุณาเลือกผู้ปฏิบัติงาน':'กรุณาเลือกชุดงาน','warn'); return; }
    if(!is.lines.length){ this.toast('ยังไม่มีรายการ','กรุณาเพิ่มอุปกรณ์ที่ต้องการเบิก','warn'); return; }
    if(!this.state.sigInk){ this.toast('ยังไม่มีลายเซ็น','กรุณาให้ผู้รับเซ็นชื่อรับของ','warn'); return; }
    const items=this.state.items.map(x=>({...x}));
    for(const l of is.lines){ const it=items.find(x=>x.id===l.itemId); if(it && l.qty>it.qty){ this.toast('สต็อกไม่พอ', it.name+' คงเหลือ '+it.qty+' '+it.unit,'danger'); return; } }
    let party='', sub='';
    if(is.kind==='individual'){ const w=this.state.workers.find(x=>x.id===is.recipientId); party=w.name; sub=w.dept; }
    else { const t=this.state.teams.find(x=>x.id===is.recipientId); party=t.name; sub='รถ '+(t.plates.join(', ')||'-'); }
    const seq=this.state.refSeq+1; const ref='ISS-'+String(seq).padStart(4,'0'); const date=thaiFromISO(this.state.issueDate)||this.thaiToday();
    const newMoves=[];
    const movedIds=[];
    for(const l of is.lines){ const it=items.find(x=>x.id===l.itemId); it.qty-=l.qty; movedIds.push(l.itemId);
      newMoves.push({ id:'m'+Date.now()+Math.floor(Math.random()*1e6), type:'out', kind:is.kind, item:it.name, qty:l.qty, unit:it.unit, party, sub, ref, date }); }
    this.setState({ items, movements:[...newMoves, ...this.state.movements], refSeq:seq,
      issue:{ kind:is.kind, recipientId:'', lineItem:'', lineQty:1, lines:[], note:'' }, issueDate:todayISO(), sigInk:false });
    this.clearSig();
    if(SB_READY){
      try {
        await Promise.all(movedIds.map(id=>{ const it=items.find(x=>x.id===id); return db.updateItemQty(id, it.qty); }));
        await db.insertMovements(newMoves);
        await db.setRefSeq(seq);
      } catch(e){ this.toast('บันทึกลง DB ไม่สำเร็จ', e.message||'', 'danger'); return; }
    }
    this.toast('เบิกจ่ายสำเร็จ', ref+' · '+party+' · '+is.lines.reduce((a,b)=>a+b.qty,0)+' ชิ้น','success');
  }

  // ---------- charts ----------
  buildTrend(){
    const THAI_DAY=['อา','จ','อ','พ','พฤ','ศ','ส'];
    const now=new Date(); const p=n=>String(n).padStart(2,'0');
    const days=[];
    for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i);
      const iso=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
      days.push({iso,label:THAI_DAY[d.getDay()],in:0,out:0}); }
    this.state.movements.forEach(m=>{
      const day=days.find(d=>thaiFromISO(d.iso)===m.date);
      if(day){ if(m.type==='in') day.in+=m.qty; else day.out+=m.qty; }
    });
    const max=Math.max(1,...days.map(d=>Math.max(d.in,d.out)));
    const bars=days.map((d,i)=>React.createElement('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:8}},
      React.createElement('div',{style:{flex:1,width:'100%',display:'flex',alignItems:'flex-end',justifyContent:'center',gap:5}},
        React.createElement('div',{style:{width:13,height:Math.max(3,d.in/max*100)+'%',background:'linear-gradient(180deg,#A24FC2,#8B2FA8)',borderRadius:'5px 5px 0 0',transformOrigin:'bottom',animation:'barGrow .6s ease '+(i*0.05)+'s both'}}),
        React.createElement('div',{style:{width:13,height:Math.max(3,d.out/max*100)+'%',background:'linear-gradient(180deg,#EDB05A,#E0902A)',borderRadius:'5px 5px 0 0',transformOrigin:'bottom',animation:'barGrow .6s ease '+(i*0.05+0.08)+'s both'}})
      ),
      React.createElement('span',{style:{fontSize:11.5,color:'#9A8FA8'}},d.label)
    ));
    return React.createElement('div',{style:{height:200,display:'flex',gap:6,alignItems:'stretch',marginTop:14}},bars);
  }
  buildDonut(){
    const its=this.state.items; const out=its.filter(i=>i.qty<=0).length; const low=its.filter(i=>i.qty>0&&i.qty<=i.min).length; const ok=its.length-out-low;
    const total=its.length||1; const a=ok/total*360, b=a+low/total*360;
    const bg='conic-gradient(#1E9E6A 0deg '+a+'deg, #E0902A '+a+'deg '+b+'deg, #D5443F '+b+'deg 360deg)';
    return React.createElement('div',{style:{width:148,height:148,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 6px 20px rgba(33,26,46,.08)'}},

    const mk=(key,label,icon,badge)=>{

      return { label, icon:I(icon), onClick:()=>this.nav(key),
        rowStyle:{ display:'flex',alignItems:'center',gap:11,padding:'9px 12px',borderRadius:11,cursor:'pointer',fontSize:14,fontWeight:500,transition:'all .18s',
          color: active?'#fff':'rgba(255,255,255,.62)',

            <div onClick={V.stop} style={css('width:100%;max-width:480px;background:#fff;border-radius:20px;box-shadow:0 30px 80px rgba(33,18,46,.4);overflow:hidden;animation:modalIn .28s cubic-bezier(.18,.89,.32,1.28)')}>
              <div style={css('padding:20px 24px;border-bottom:1px solid #F0EDF5;display:flex;align-items:center;justify-content:space-between')}>
                <div style={css('font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px')}><span style={css('color:#8B2FA8')}>{V.plusIcon}</span>{V.modalTitle}</div>
                <Box tag="button" onClick={V.closeModal} s="width:34px;height:34px;border-radius:9px;border:none;background:#F5F2F9;color:#8A8398;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s" h="background:#FBEAEA;color:#D5443F">{V.closeIcon}</Box>
              </div>
              <div style={css('padding:22px 24px;display:flex;flex-direction:column;gap:14px')}>

                {V.modalIsItem && (<>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ชื่ออุปกรณ์</label>
                    <Box tag="input" id="ai_name" placeholder="เช่น ถุงมือกันบาด" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <div style={css('display:grid;grid-template-columns:1fr 1fr;gap:12px')}>
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>หมวดหมู่</label>
                      <div style={css('position:relative')}>
                        <Box tag="select" id="ai_cat" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 32px 0 13px;font-size:13.5px;appearance:none;cursor:pointer" f="border-color:#B97FCE;background:#fff">
                          {V.catOptions.map((c,i)=>(<option key={i} value={c}>{c}</option>))}
                        </Box>
                        <span style={css('position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#A79FB6;pointer-events:none')}>{V.chevronIcon}</span>
                      </div>
                    </div>
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>หน่วยนับ</label>
                      <Box tag="input" id="ai_unit" placeholder="คู่ / อัน / ชุด" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                    </div>
                  </div>
                  <div style={css('display:grid;grid-template-columns:1fr 1fr;gap:12px')}>
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>จำนวนเริ่มต้น</label>
                      <Box tag="input" id="ai_qty" type="number" min="0" defaultValue="0" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px;font-family:'IBM Plex Mono',monospace" f="border-color:#B97FCE;background:#fff" />
                    </div>
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>จุดสั่งซื้อขั้นต่ำ</label>
                      <Box tag="input" id="ai_min" type="number" min="0" defaultValue="5" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px;font-family:'IBM Plex Mono',monospace" f="border-color:#B97FCE;background:#fff" />
                    </div>
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>จุดจัดเก็บ</label>
                    <Box tag="input" id="ai_loc" placeholder="เช่น ชั้น A-2" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <Box tag="button" onClick={V.submitAddItem} s="height:48px;margin-top:4px;border-radius:12px;border:none;background:linear-gradient(120deg,#8B2FA8,#B0309C);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(139,47,168,.3)" h="filter:brightness(1.05)">บันทึกรายการ</Box>
                </>)}

                {V.modalIsWorker && (<>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ชื่อ – สกุล</label>
                    <Box tag="input" id="aw_name" placeholder="เช่น สมชาย ใจดี" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ตำแหน่งงาน</label>
                    <Box tag="input" id="aw_pos" placeholder="เช่น พนักงานช่าง 3" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>แผนก</label>
                    <div style={css('position:relative')}>
                      <Box tag="select" id="aw_dept" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 32px 0 13px;font-size:13.5px;appearance:none;cursor:pointer" f="border-color:#B97FCE;background:#fff">
                        {V.deptOptions.map((d,i)=>(<option key={i} value={d}>{d}</option>))}
                      </Box>
                      <span style={css('position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#A79FB6;pointer-events:none')}>{V.chevronIcon}</span>
                    </div>
                  </div>
                  <Box tag="button" onClick={V.submitAddWorker} s="height:48px;margin-top:4px;border-radius:12px;border:none;background:linear-gradient(120deg,#8B2FA8,#B0309C);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(139,47,168,.3)" h="filter:brightness(1.05)">บันทึกผู้ปฏิบัติงาน</Box>
                </>)}

                {V.modalIsVehicle && (<>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ทะเบียนรถ</label>
                    <Box tag="input" id="av_plate" placeholder="เช่น ผก-1234 เบตง" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px;font-family:'IBM Plex Mono',monospace" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ประเภทรถ</label>
                    <div style={css('position:relative')}>
                      <Box tag="select" id="av_type" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 32px 0 13px;font-size:13.5px;appearance:none;cursor:pointer" f="border-color:#B97FCE;background:#fff">
                        {V.vtypeOptions.map((t,i)=>(<option key={i} value={t}>{t}</option>))}
                      </Box>
                      <span style={css('position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#A79FB6;pointer-events:none')}>{V.chevronIcon}</span>
                    </div>
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ชุดงานที่สังกัด</label>
                    <Box tag="input" id="av_team" placeholder="เช่น ชุดปฏิบัติการที่ 1" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f="border-color:#B97FCE;background:#fff" />
                  </div>
                  <Box tag="button" onClick={V.submitAddVehicle} s="height:48px;margin-top:4px;border-radius:12px;border:none;background:linear-gradient(120deg,#8B2FA8,#B0309C);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(139,47,168,.3)" h="filter:brightness(1.05)">บันทึกทะเบียนรถ</Box>
                </>)}

                {V.modalIsTeam && (<>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>ชื่อชุดปฏิบัติงาน</label>
                    <Box tag="input" value={V.teamForm.name||''} onChange={(e)=>V.setTeamForm('name',e.target.value)} placeholder="เช่น ชุดปฏิบัติการที่ 1" s="width:100%;height:44px;border:1px solid #E7E2EF;border-radius:11px;background:#F7F5FA;padding:0 13px;font-size:14px" f={FIELD_FOCUS} />
                  </div>
                  <div>
                    <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:7px')}>หัวหน้าชุด</label>
                    <SearchSelect value={V.teamForm.leadId||''} options={[{value:'',label:'— ไม่ระบุ —'}].concat(V.leadOptions)} onChange={(val)=>V.setTeamForm('leadId',val)} placeholder="— ไม่ระบุ —" size="sm" />
                  </div>
                  {V.memberPool.length>0 && (
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:9px')}>สมาชิกในชุด ({V.teamForm.memberIds.length} คน)</label>
                      <Box tag="input" value={V.memberQ} onChange={(e)=>V.setMemberQ(e.target.value)} placeholder="พิมพ์ค้นหาชื่อสมาชิก..." s="width:100%;height:40px;border:1px solid #E7E2EF;border-radius:10px;background:#F7F5FA;padding:0 12px;font-size:13.5px;margin-bottom:8px" f={FIELD_FOCUS} />
                      <div style={css('display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;padding:2px')}>
                        {V.memberPool.filter(w=>!V.memberQ||(w.name+' '+(w.pos||'')).toLowerCase().includes(V.memberQ.toLowerCase())).map((w,i)=>{
                          const checked=V.teamForm.memberIds.includes(w.id);
                          return (<label key={i} style={css('display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid '+(checked?'#C9AED9':'#ECEAF1')+';background:'+(checked?'#F6EEFA':'#fff')+';cursor:pointer;transition:all .15s')}>
                            <input type="checkbox" checked={checked} onChange={()=>V.toggleTeamMember(w.id)} style={css('width:16px;height:16px;accent-color:#8B2FA8;cursor:pointer;flex-shrink:0')} />
                            <span style={css('font-size:13.5px;font-weight:'+(checked?'600':'400'))}>{w.name}</span>
                            <span style={css('font-size:12px;color:#A79FB6;flex:1;text-align:right')}>{w.pos}</span>
                          </label>);
                        })}
                      </div>
                    </div>
                  )}
                  {V.vehicleRows.length>0 && (
                    <div>
                      <label style={css('display:block;font-size:12.5px;color:#6E687C;font-weight:500;margin-bottom:9px')}>ยานพาหนะในชุด</label>
                      <div style={css('display:flex;flex-wrap:wrap;gap:8px')}>
                        {V.vehicleRows.map((v,i)=>{
                          const checked=V.teamForm.plates.includes(v.plate);
                          return (<label key={i} style={css('display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:10px;border:1px solid '+(checked?'#C9AED9':'#ECEAF1')+';background:'+(checked?'#F6EEFA':'#fff')+';cursor:pointer;transition:all .15s')}>
                            <input type="checkbox" checked={checked} onChange={()=>V.toggleTeamPlate(v.plate)} style={css('width:15px;height:15px;accent-color:#8B2FA8;cursor:pointer')} />
                            <span style={css("font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:"+(checked?'600':'400'))}>{v.plate}</span>
                          </label>);
                        })}
                      </div>
                    </div>
                  )}
                  <Box tag="button" onClick={V.submitAddTeam} s="height:48px;margin-top:4px;border-radius:12px;border:none;background:linear-gradient(120deg,#8B2FA8,#B0309C);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(139,47,168,.3)" h="filter:brightness(1.05)">บันทึกชุดปฏิบัติงาน</Box>
                </>)}

              </div>
            </div>
          </div>
        )}

      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
